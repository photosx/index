<!DOCTYPE html>
<html lang="en">

<title>Important Update...</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* Loading */
#loading{
position:fixed;
width:100%;
height:100%;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.loader{
border:5px solid #222;
border-top:5px solid #00ffcc;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* Main */
#main{
display:none;
height:100vh;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
text-align:center;
}

/* Card */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
animation:pop 0.6s ease;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

@keyframes pop{
from{transform:scale(0.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h1{font-size:3em;}
p{margin-top:10px;font-size:1.2em;}

img{
width:260px;
margin-top:20px;
border-radius:15px;
}

/* Button */
button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff416c;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:black;
color:white;
}

/* Glitch */
.glitch{
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 2px red;}
25%{text-shadow:-2px -2px cyan;}
50%{text-shadow:2px -2px lime;}
75%{text-shadow:-2px 2px yellow;}
100%{text-shadow:2px 2px red;}
}
</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
<p style="margin-top:15px;">Loading important data Click For Fast Loading...</p>
</div>

<div id="main">
